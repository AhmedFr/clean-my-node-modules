name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint + format check
        run: pnpm exec biome ci .

      - name: Typecheck
        run: pnpm typecheck

      - name: Typecheck (video)
        run: pnpm video:typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

  package-macos:
    # Proves the .app actually assembles; unsigned (signing happens in releases).
    runs-on: macos-latest
    needs: check
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Package unsigned .app
        run: pnpm package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
